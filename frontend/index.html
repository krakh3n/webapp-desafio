<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>WebApp Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col font-sans">

    <nav class="bg-blue-600 p-4 text-white shadow flex justify-between hidden" id="navbar">
        <h1 class="text-xl font-bold">Admin Panel MVP</h1>
        <button onclick="logout()" class="bg-red-500 px-3 py-1 rounded hover:bg-red-700">Salir</button>
    </nav>

    <div class="flex-grow flex items-center justify-center p-4">
        
        <div id="login-view" class="bg-white p-8 rounded shadow-md w-full max-w-sm">
            <h2 class="text-2xl mb-6 font-bold text-gray-800">Iniciar Sesión</h2>
            <div id="login-error" class="text-red-500 mb-4 hidden"></div>
            <input type="text" id="username" placeholder="Usuario" class="w-full p-2 mb-4 border rounded">
            <input type="password" id="password" placeholder="Contraseña" class="w-full p-2 mb-6 border rounded">
            <button onclick="login()" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700 font-bold">Ingresar</button>
        </div>

        <div id="change-pwd-view" class="bg-white p-8 rounded shadow-md w-full max-w-sm hidden">
            <h2 class="text-2xl mb-4 font-bold text-gray-800 text-center">Cambio Obligatorio</h2>
            <p class="text-sm text-gray-600 mb-6 text-center">Por seguridad, debés cambiar la clave por defecto.</p>
            <div id="pwd-error" class="text-red-500 mb-4 hidden"></div>
            <input type="password" id="new-password" placeholder="Nueva Contraseña" class="w-full p-2 mb-6 border rounded">
            <button onclick="changePassword()" class="w-full bg-green-600 text-white p-2 rounded hover:bg-green-700 font-bold">Actualizar</button>
        </div>

        <div id="dashboard-view" class="w-full max-w-4xl hidden h-full py-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="bg-white p-4 rounded shadow">
                    <h3 class="text-gray-500 text-sm">Estado API</h3>
                    <p id="dash-status" class="text-2xl font-bold text-green-600">-</p>
                </div>
                <div class="bg-white p-4 rounded shadow">
                    <h3 class="text-gray-500 text-sm">Tiempo Online</h3>
                    <p id="dash-uptime" class="text-2xl font-bold text-blue-600">-</p>
                </div>
                <div class="bg-white p-4 rounded shadow">
                    <h3 class="text-gray-500 text-sm">Usuarios Activos</h3>
                    <p id="dash-users" class="text-2xl font-bold text-purple-600">-</p>
                </div>
            </div>
            <div class="bg-gray-900 p-4 rounded shadow h-64 overflow-y-auto">
                <h3 class="text-gray-400 text-sm mb-2 uppercase">Logs del Sistema en Tiempo Real</h3>
                <pre id="dash-logs" class="text-green-400 text-xs font-mono whitespace-pre-wrap"></pre>
            </div>
        </div>

    </div>

    <script>
        let tempUser = '';
        let currentToken = '';
        let dashboardInterval;

        const show = (id) => document.getElementById(id).classList.remove('hidden');
        const hide = (id) => document.getElementById(id).classList.add('hidden');

        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const err = document.getElementById('login-error');
            
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });
            const data = await res.json();

            if (res.status === 403 && data.requirePasswordChange) {
                tempUser = data.tempUser;
                document.getElementById('password').value = ''; // Guardar para el paso 2
                hide('login-view');
                show('change-pwd-view');
            } else if (res.ok) {
                currentToken = data.token;
                loadDashboard();
            } else {
                err.innerText = data.error || 'Error de conexión';
                show('login-error');
            }
        }

        async function changePassword() {
            const np = document.getElementById('new-password').value;
            const op = document.getElementById('password').value; // Usamos la que tipeó antes
            const err = document.getElementById('pwd-error');

            const res = await fetch('/api/change-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: tempUser, currentPassword: op, newPassword: np })
            });
            
            if (res.ok) {
                alert("Contraseña actualizada. Por favor, iniciá sesión.");
                document.getElementById('new-password').value = '';
                document.getElementById('password').value = '';
                hide('change-pwd-view');
                show('login-view');
            } else {
                const data = await res.json();
                err.innerText = data.error || 'Error al cambiar';
                show('pwd-error');
            }
        }

        async function loadDashboard() {
            hide('login-view');
            show('navbar');
            show('dashboard-view');
            fetchStats();
            // Polling simple cada 3 segundos
            dashboardInterval = setInterval(fetchStats, 3000);
        }

        async function fetchStats() {
            const res = await fetch('/api/dashboard', {
                headers: { 'Authorization': 'Bearer ' + currentToken }
            });
            if (res.ok) {
                const data = await res.json();
                document.getElementById('dash-status').innerText = data.status;
                document.getElementById('dash-uptime').innerText = data.uptime;
                document.getElementById('dash-users').innerText = data.activeUsersCount;
                
                // Formatear logs
                const logsText = data.logs.map(l => {
                    try { return JSON.parse(l).message || l; } catch { return l; }
                }).join('\n');
                document.getElementById('dash-logs').innerText = logsText;
            } else if(res.status === 403 || res.status === 401) {
                logout();
            }
        }

        function logout() {
            currentToken = '';
            clearInterval(dashboardInterval);
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            hide('dashboard-view');
            hide('navbar');
            show('login-view');
        }
    </script>
</body>
</html>
